version: "3.9"

services:
  translai:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config
    environment:
      - TZ=UTC
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped

volumes:
  ollama_data:
