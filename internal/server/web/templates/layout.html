<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TranslAI{{if .Title}} — {{.Title}}{{end}}</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js" defer></script>
</head>
<body>
  <nav>
    <span class="brand">TranslAI</span>
    <a href="/"{{if eq .Page "convert"}} class="active"{{end}}>Conversion</a>
    <a href="/review"{{if eq .Page "review"}} class="active"{{end}}>Editeur</a>
    <a href="/admin"{{if eq .Page "admin"}} class="active"{{end}}>Administration</a>
  </nav>
  <main>
    {{template "content" .}}
  </main>
  <script src="/static/app.js" defer></script>
</body>
</html>
